[homing_override]
axes: xyz
gcode:
  # Check which axes the user actually requested
  {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

  # 1. Lift Z slightly (Safety first!)
  # This prevents the nozzle from dragging across the bed/clips
  G91           # Relative mode
  G1 Z5 F600    # Lift Z 5mm
  G90           # Back to Absolute mode

  # 2. Set Homing Currents
  SET_TMC_CURRENT STEPPER=stepper_x CURRENT=0.6
  SET_TMC_CURRENT STEPPER=stepper_y CURRENT=0.7
  G4 P2000      # The "Big Dwell" to settle registers

  # 3. Home X
  {% if home_all or 'X' in params %}
    G28 X
    G1 X5 F3000  # Back away just a little bit (5mm)
  {% endif %}

  G4 P500       # Small dwell between axes

  # 4. Home Y
  {% if home_all or 'Y' in params %}
    G28 Y
    G1 Y5 F3000  # Back away just a little bit (5mm)
  {% endif %}

  # 5. Restore Printing Currents
  SET_TMC_CURRENT STEPPER=stepper_x CURRENT=1.0
  SET_TMC_CURRENT STEPPER=stepper_y CURRENT=1.0
  G4 P1000      # Let current stabilize before Z move

  # 6. Home Z
  {% if home_all or 'Z' in params %}
    # Move to bed center (Adjust 150, 150 to your bed's center)
    G1 X150 Y150 F6000 
    G28 Z
    G1 Z10 F600  # Post-home Z lift
  {% endif %}