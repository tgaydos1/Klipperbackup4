[homing_override]
axes: xyz
gcode:
  {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

  # 1. Lift Z
  G91
  G1 Z5 F600
  G90

  # 2. Home X and Retract to Middle
  {% if home_all or 'X' in params %}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT=0.59
    G4 P2000
    G28 X
    M400            
    G91
    G1 X-15 F3000   # Initial small bounce away from the wall
    G90
    M400
    # --- NEW: Move to middle of X bed (X90) ---
    G1 X90 F6000    
    M400
    G4 P2500        # Dwell to clear 5160 registers
  {% endif %}
    
  # 3. THE "Y RESET" SEQUENCE
  {% if home_all or 'Y' in params %}
    M400            
    # Briefly drop current to 0 to "reboot" the driver logic
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT=0
    G4 P2500      
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT=0.59
    G4 P2500        
    
    G28 Y           
    G91
    G1 Y-15 F3000   
    G90
    M400
  {% endif %}

  # 4. Restore Printing Currents
  SET_TMC_CURRENT STEPPER=stepper_x CURRENT=1.0
  SET_TMC_CURRENT STEPPER=stepper_y CURRENT=1.0
  G4 P1000

  # 5. Home Z (X is already at 90, so this move is now shorter)
  {% if home_all or 'Z' in params %}
    G1 X90 Y90 F6000 
    G28 Z
  {% endif %}