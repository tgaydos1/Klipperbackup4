[homing_override]
axes: xyz
gcode:
  {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

  # 1. Safety Z Lift
  G91
  G1 Z5 F600
  G90

  # 2. Home X
  {% if home_all or 'X' in params %}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT=0.6
    G4 P2000          # Dwell to settle
    G28 X
    G91
    G1 X-5 F200      # Back away from the rail
    G90
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={printer.configfile.settings['tmc2209 stepper_x'].run_current}
  {% endif %}

  # 3. THE FIX FOR Y: Clear the driver state
  # We wait longer and explicitly set current again to force a register refresh
  G4 P2000            # Increased dwell between X and Y
  M400                # Wait for all moves to finish 100%

  # 4. Home Y
  {% if home_all or 'Y' in params %}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT=0.7
    G4 P2000          # Essential Dwell for Y
    G28 Y
    G91
    G1 Y-5 F3000      # Back away
    G90
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={printer.configfile.settings['tmc2209 stepper_y'].run_current}
  {% endif %}

  # 5. Home Z
  {% if home_all or 'Z' in params %}
    G1 X150 Y150 F6000 # Move to center
    G28 Z
  {% endif %}