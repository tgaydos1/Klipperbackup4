[homing_override]
axes: xyz
gcode:
  {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

  # 1. Lift Z for safety
  G91
  G1 Z5 F600
  G90

  # 2. Home X Axis
  {% if home_all or 'X' in params %}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT=0.6
    G4 P2000          # Settle
    G28 X             # Home X
    G91
    G1 X-10 F3000     # Back away from positive rail
    G90
    M400              # Wait for move to finish
    # Restore X current now so the electrical bus stabilizes
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={printer.configfile.settings['tmc5160 stepper_x'].run_current}
  {% endif %}

  # 3. THE "Y-RESET" SEQUENCE (Fixes your specific issue)
  {% if home_all or 'Y' in params %}
    M400                              # Sync
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT=0   # Drop Y current to 0 to clear stall
    G4 P500                           # Half-second pause
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT=0.7 # Set Y homing current
    G4 P2000                          # Mandatory 2s Dwell to clear 5160 registers
    
    G28 Y                             # Home Y
    G91
    G1 Y-10 F3000                     # Back away
    G90
    M400
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={printer.configfile.settings['tmc5160 stepper_y'].run_current}
  {% endif %}

  # 4. Home Z Axis
  {% if home_all or 'Z' in params %}
    G1 X90 Y90 F6000                  # Move to center of 180mm bed
    G28 Z
  {% endif %}