[homing_override]
axes: xyz
gcode:
  # 1. Lower the current for X and Y to 0.5 for a "soft" bump
  #SET_TMC_CURRENT STEPPER=stepper_x CURRENT=0.6
  #SET_TMC_CURRENT STEPPER=stepper_y CURRENT=0.6
  
  # 2. Wait a moment for the currents to settle
  G4 P2000

  # 3. Home X and Y
  # (Modify order if you prefer Y then X)
  G28 X
  G1 X165 F3000   # Move away from the edge so it doesn't "re-trigger"
  
  G28 Y
  G1 Y165 F3000   # Move away from the edge
  
  # 4. Home Z (assumes you have a probe or Z endstop)
  G28 Z

  # 5. Set the current back to 1.0 for printing
  SET_TMC_CURRENT STEPPER=stepper_x CURRENT=1.0
  SET_TMC_CURRENT STEPPER=stepper_y CURRENT=1.0